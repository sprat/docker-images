services:
  mergerfs:
    image: ${IMAGE}:latest
    configs:
      - source: file1
        target: /media/data1/file1.txt
      - source: file2
        target: /media/data2/file2.txt
    command:
      - -o
      - debug=true
      - /media/data1:/media/data2
      - /pool
    build:
      args:
        VERSION: ${VERSION}
      tags:
        - ${IMAGE}:${VERSION}
        - ${IMAGE}:latest
      x-bake:
        platforms:
          - linux/amd64
          - linux/arm64
          - linux/arm/v7
    cap_add:
      - SYS_ADMIN
      - SYS_NICE
    security_opt:
      - apparmor:unconfined
      - seccomp:unconfined
    devices:
      - /dev/fuse:/dev/fuse
    volumes:
      - /tmp/mergerfs-image-test:/pool:shared

  test:
    image: busybox:latest
    command:
      - sh
      - -c
      - test -f /pool/file1.txt && test -f /pool/file2.txt
    depends_on:
      mergerfs:
        condition: service_started
    volumes:
      - /tmp/mergerfs-image-test:/pool:shared

configs:
  file1:
    content: |
      Content of file1
  file2:
    content: |
      Content of file2
