name: CI

"on": push

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      components: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            mergerfs: 'mergerfs/**'
            snapraid: 'snapraid/**'

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/bake-action@v7

  build:
    runs-on: ubuntu-latest
    needs:
      - changes
    if: fromJSON(needs.changes.outputs.components)[0] != null
    environment: ${{ case(github.ref == 'refs/heads/master', 'release', null) }}
    strategy:
      matrix:
        component: ${{ fromJSON(needs.changes.outputs.components) }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      # Login only when the DOCKERHUB_USERNAME variable is provided via the job environment
      - if: vars.DOCKERHUB_USERNAME != null
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/bake-action@v7
        with:
          source: ./${{ matrix.component }}
          push: ${{ vars.DOCKERHUB_USERNAME != null }}

  status-check:
    runs-on: ubuntu-latest
    if: always()
    needs:
      - validate
      - build
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: build
